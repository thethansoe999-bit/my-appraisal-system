<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appraisal Form For Trustworthy Bonus</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --teal-dark: #00796b; --teal-main: #009688; --teal-light: #e0f2f1; --teal-header: #b2dfdb; }
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f0f4f3; margin: 0; padding: 20px; }
        .container { max-width: 1550px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-title { text-align: center; color: var(--teal-dark); font-size: 36px; font-weight: bold; margin-bottom: 25px; border-bottom: 3px solid var(--teal-header); padding-bottom: 15px; }
        .filter-group { display: flex; gap: 15px; margin-bottom: 25px; justify-content: space-between; flex-wrap: nowrap; }
        .filter-btn, .print-btn { flex: 1; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Pyidaungsu', sans-serif; font-size: 15px; transition: all 0.3s ease; border: 2px solid #ddd; background: white; color: #333; text-align: center; }
        .btn-all:hover { background-color: #2196F3 !important; color: white !important; border-color: #2196F3; }
        .btn-reliable:hover { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50; }
        .btn-unreliable:hover { background-color: #f44336 !important; color: white !important; border-color: #f44336; }
        .print-btn:hover { background-color: #795548 !important; color: white !important; border-color: #795548; }
        .filter-btn.active { background-color: var(--teal-main); color: white; border-color: var(--teal-main); }
        .print-btn { background: #43a047; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; } 
        .emp-name-row td { background-color: var(--teal-light); color: var(--teal-dark); font-size: 24px; font-weight: bold; padding: 15px; border: 2px solid var(--teal-main); text-align: center; }
        .emp-header-row th:nth-child(1) { width: 30px; }  
        .emp-header-row th:nth-child(2) { width: 80px; }  
        .emp-header-row th:nth-child(n+3) { width: auto; } 
        .emp-header-row th { background-color: var(--teal-header); color: var(--teal-dark); padding: 8px 4px; font-size: 12px; border: 1px solid #90a4ae; height: 110px; vertical-align: middle; line-height: 1.4; word-wrap: break-word; }
        td { border: 1px solid #cfd8dc; text-align: center; vertical-align: middle; height: 45px; font-size: 14px; overflow: hidden; }
        .total-row td { background-color: #f9f9f9; font-weight: bold; }
        .editable:hover { background-color: #fff9c4 !important; outline: 2px solid var(--teal-main); cursor: cell; }
        #status-msg { text-align: center; padding: 10px; font-weight: bold; color: var(--teal-dark); font-size: 18px; }
        @media print { @page { size: A3 landscape; margin: 0.5cm; } body { padding: 0; background: white; } .container { box-shadow: none; max-width: 100%; padding: 0; } .filter-group { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Appraisal Form For Trustworthy Bonus</div>
    <div class="filter-group">
        <button id="btn-all" class="filter-btn active btn-all" onclick="filterData('all', this)">All Employees</button>
        <button id="btn-reliable" class="filter-btn btn-reliable" onclick="filterData('5', this)">Reliable Employees</button>
        <button id="btn-unreliable" class="filter-btn btn-unreliable" onclick="filterData('low', this)">Unreliable Employees</button>
        <button class="print-btn" onclick="window.print()">Print Report</button>
    </div>
    <div id="status-msg">ဒေတာများကို ချိတ်ဆက်နေပါသည်...</div>
    <table id="appraisalTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const SPREADSHEET_ID = '1CKh9lQ7Z3hV65IeSNyn3IhsUXFrxO4XfC8bbTsJ084A';
    const API_KEY = 'AIzaSyDXEoPAFqagxCdOBJgnRaEPAf-fIEPgnIY';
    const SHEET_NAME = 'Jan'; 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwyuMsm7S5zerJEqYXwb7rDWFe88rRgHJF7SkoTiRrEwZdKejyNg-F48TTuOTaQcEpH/exec";

    window.allDataRows = [];

    const validRemarkRows = [5,7,9,11,19,21,23,25,33,35,37,39,47,49,51,53,61,63,65,67,75,77,79,81,89,91,93,95,103,105,107,109,117,119,121,123,131,133,135,137,145,147,149,151,159,161,163,165,173,175,177,179];

    async function fetchData() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:H500?key=${API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.values) {
                window.allDataRows = data.values; 
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('appraisalTable').style.display = 'table';
                renderTable(window.allDataRows);
            }
        } catch (error) {
            document.getElementById('status-msg').textContent = 'ဒေတာချိတ်ဆက်မှု မအောင်မြင်ပါ။';
        }
    }

    function renderTable(rows) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        const headerHTML = `<tr class="emp-header-row"><th>No.</th><th>Week</th><th>မှီခိုအားထားနိုင်ခြင်း နှင့် ယုံကြည်စိတ်ချရခြင်း<br>(Dependable and Reliable)</th><th>ဝန်ဆောင်မှု ကောင်းမွန်ခြင်း<br>(Good Customer Service)</th><th>တာဝန်ယူတတ်ခြင်း နှင့် စိတ်နေသဘောထား<br>(Accountable and Good Attitude)</th><th>လူအများနှင့် လိုက်လျောညီထွေ ပြောဆိုနေထိုင်တတ်မှု<br>(Good Communication)</th><th>သပ်ရပ်သန့်ရှင်းစွာ နေထိုင်တတ်ခြင်း<br>(Personal Grooming)</th><th>စည်းကမ်းလိုက်နာမှု<br>(Disciplinarian)</th></tr>`;
        
        rows.forEach((row, rowIndex) => {
            const sheetRowNum = rowIndex + 2; 
            const cell0 = row[0] ? String(row[0]).trim() : "";
            const cell1 = row[1] ? String(row[1]).trim() : "";
            if (cell0 === "No." || cell1 === "Week") return;
            const isNameRow = cell0 && !row[1] && !row[2] && !cell0.includes("ပျမ်းမျှ");

            if (isNameRow) {
                const trName = document.createElement('tr');
                trName.className = 'emp-name-row';
                const tdName = document.createElement('td');
                tdName.colSpan = 8;
                tdName.textContent = cell0;
                tdName.contentEditable = true;
                tdName.className = 'editable';
                tdName.onblur = () => updateSheet(sheetRowNum, 1, tdName.textContent.trim());
                trName.appendChild(tdName);
                tableBody.appendChild(trName);
                tableBody.insertAdjacentHTML('beforeend', headerHTML);
            } else if (row[1] || cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း")) {
                const tr = document.createElement('tr');
                const isTotalRow = cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း");
                const isFinalBonusRow = cell0.includes("ပျမ်းမျှဆုကြေးငွေစုစုပေါင်း");
                const isRemarkRow = validRemarkRows.includes(sheetRowNum);
                if (isTotalRow) tr.className = 'total-row';

                for (let i = 0; i < 8; i++) {
                    if (isTotalRow && i === 0) {
                        const td = document.createElement('td');
                        td.colSpan = 2; td.textContent = cell0; td.style.fontWeight = "bold"; td.style.textAlign = "center";
                        tr.appendChild(td); continue; 
                    }
                    if (isTotalRow && i === 1) continue;

                    if (isFinalBonusRow) {
                        if (i === 2) {
                            const tdAmt = document.createElement('td'); tdAmt.colSpan = 3;
                            const val = parseFloat(String(row[2]).replace(/,/g, '')) || 0;
                            tdAmt.textContent = row[2] || '0'; tdAmt.style.fontWeight = "bold"; tdAmt.style.textAlign = "center";
                            if (val <= 30000) tdAmt.style.color = "red"; else if (val <= 60000) tdAmt.style.color = "black"; else tdAmt.style.color = "#2e7d32";
                            tr.appendChild(tdAmt); continue;
                        }
                        if (i === 3 || i === 4) continue;
                        if (i === 5) {
                            const tdTxt = document.createElement('td'); tdTxt.textContent = "အမှန်တကယ်ရရှိမည့် ဆုကြေးငွေ (Actual Bonus)"; tdTxt.style.fontSize = "12px"; tdTxt.style.fontWeight = "bold";
                            tr.appendChild(tdTxt); continue;
                        }
                        if (i === 6) {
                            const tdManual = document.createElement('td'); tdManual.colSpan = 2;
                            const mVal = parseFloat(String(row[6]).replace(/,/g, '')) || 0;
                            tdManual.textContent = row[6] || ''; tdManual.contentEditable = true; tdManual.className = 'editable'; tdManual.style.fontWeight = "bold"; tdManual.style.textAlign = "center";
                            if (mVal <= 30000) tdManual.style.color = "red"; else if (mVal <= 60000) tdManual.style.color = "black"; else tdManual.style.color = "#2e7d32";
                            tdManual.onblur = () => updateSheet(sheetRowNum, 7, tdManual.textContent.trim());
                            tdManual.onkeydown = (e) => { if(e.key === "Enter") { e.preventDefault(); tdManual.blur(); } };
                            tr.appendChild(tdManual); continue;
                        }
                        if (i === 7) continue;
                    }

                    // --- အဆင့် (၂၂) ပြင်ဆင်ချက်- Column A (No.) Merge စနစ် ---
                    if (i === 0 && !isTotalRow && row[1]) {
                        const startRows = [4, 18, 32, 46, 60, 74, 88, 102, 116, 130, 144, 158, 172];
                        if (startRows.includes(sheetRowNum)) {
                            const td = document.createElement('td');
                            td.textContent = cell0;
                            td.rowSpan = 8; 
                            td.style.fontWeight = "bold"; 
                            td.style.fontSize = "18px";
                            td.style.verticalAlign = "middle"; 
                            td.style.textAlign = "center";
                            tr.appendChild(td);
                        }
                        continue; 
                    }

                    const td = document.createElement('td');
                    let val = row[i] || ''; 
                    
                    if (isRemarkRow && i >= 2) {
                        td.style.height = "auto";
                        td.style.minHeight = "45px";
                        td.style.resize = "vertical"; 
                        td.style.overflow = "auto";
                        td.style.textAlign = "left";
                        td.style.padding = "5px";
                        td.style.fontSize = "12px";
                        td.className = 'editable remark-cell';
                        td.contentEditable = true;
                        td.onblur = () => updateSheet(sheetRowNum, i + 1, td.textContent.trim());
                    } else if (i >= 2 && i <= 7 && !isTotalRow && row[1]) {
                        td.className = 'editable score-cell';
                        td.contentEditable = true;
                        const s = parseInt(val);
                        if (!isNaN(s)) {
                            if (s <= 2) { td.style.color = "red"; td.style.fontWeight = "bold"; }
                            else if (s === 5) { td.style.color = "#2e7d32"; td.style.fontWeight = "bold"; }
                        }
                        td.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); td.blur(); } };
                        td.onblur = () => updateSheet(sheetRowNum, i + 1, td.textContent.trim());
                    }

                    td.textContent = val;
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }
        });
    }

            4: ["တာဝန်များကို မညည်းမညူဆောင်ရွက်ပြီး လုပ်ငန်းလိုအပ်ချက်အရ ပြောင်းလဲမှုများကို လိုက်လျောညီထွေရှိသည်။", "လုပ်ငန်းအပေါ် စိတ်ပါဝင်စားစွာ လုပ်ကိုင်ပြီး ပေးအပ်သော တာဝန်များကို စနစ်တကျ ပြီးမြောက်အောင်မြင်သည်။", "ရုံးခွဲပြောင်းရွှေ့ရန်နှင့် နားရက်အပြောင်းအလဲများကို လိုလိုလားလား လိုက်လျောပေးနိုင်သူဖြစ်သည်။"],

            0: ["လုပ်ငန်းအပေါ် စိတ်ပါဝင်စားမှု အားနည်းပြီး တာဝန်ယူလိုစိတ်နှင့် အနစ်နာခံလိုစိတ် မြှင့်တင်ရန် လိုအပ်သည်။", "တာဝန်များကို ပြီးမြောက်အောင် ဆောင်ရွက်နိုင်ရန် အနီးကပ် စောင့်ကြည့်ကွပ်ကဲမှု အမြဲမပြတ် လိုအပ်နေသည်။", "လုပ်ငန်းလိုအပ်ချက်အရ ပြောင်းလဲမှုများအပေါ် လိုက်လျောညီထွေရှိမှု အားနည်းနေသည်ကို တွေ့ရသည်။"]
        };
        const remarksD = {
            5: ["စိတ်ရှည်သည်းခံပြီး Customer အား အမြဲပြုံးရွှင်စွာ ဝန်ဆောင်မှုပေးသည်။ Complain လုံးဝမရှိဘဲ စေတနာပါပါ ကူညီဆောင်ရွက်ပေးသည်။", "မျက်နှာမပျက်ဘဲ အမြဲတက်ကြွစွာ ဧည့်ခံတတ်ပြီး Customer စိတ်ကျေနပ်မှုရသည်အထိ အားသွန်ခွန်စိုက် ဝန်ဆောင်မှုပေးနိုင်သည်။", "ယဥ်ကျေးသိမ့်မွေ့စွာ ပြောဆိုဆက်ဆံတတ်ပြီး Customer အခက်အခဲများကို ဖုန်းဖြင့်ဖြစ်စေ၊ ကိုယ်တိုင်ဖြစ်စေ ပြေလည်အောင် ဖြေရှင်းပေးသည်။"],
            4: ["စကားပြောချိုသာယဥ်ကျေးပြီး Customer ၏ လိုအပ်ချက်များကို တက်ကြွစွာ ဖြည့်ဆည်းပေးသည်။ အလုပ်ခွင်တွင် အမြဲအသင့်အနေအထားရှိသည်။", "Customer အား ခရီးဦးကြိုပြုခြင်းနှင့် ဧည့်ခံခြင်းတို့ကို ကောင်းမွန်စွာ ဆောင်ရွက်ပြီး ပစ္စည်းများကို ဆိုင်ပြင်အထိ ကူညီပို့ဆောင်ပေးသည်။", "ဝန်ဆောင်မှုအပေါ် စိတ်အားထက်သန်မှုရှိပြီး Customer Complain မရှိအောင် ဂရုတစိုက် ဆောင်ရွက်တတ်သူဖြစ်သည်။"],
            3: ["သတ်မှတ်ထားသော ဝန်ဆောင်မှုစံနှုန်းများအတိုင်း ဆောင်ရွက်သည်။ Customer များအပေါ် ယဥ်ကျေးမှုရှိပြီး ပုံမှန်အတိုင်း ဧည့်ခံကျွေးမွေးနိုင်သည်။", "လုပ်ငန်းခွင်အတွင်း တာဝန်သိစိတ်ဖြင့် ဝန်ဆောင်မှုပေးပြီး Customer တောင်းဆိုချက်များကို သင့်တင့်လျောက်ပတ်စွာ ဆောင်ရွက်ပေးသည်။", "အပြောအဆို ပုံမှန်ရှိပြီး Customer များအား အဆင်ပြေအောင် ကူညီပေးနိုင်သည့် အသင့်အတင့်ရှိသော ဝန်ထမ်းဖြစ်သည်။"],
            0: ["Customer ဝန်ဆောင်မှုပေးရာတွင် စိတ်ရှည်မှု အားနည်းပြီး တက်ကြွမှု လိုအပ်နေသည်။ အပြုအမူနှင့် အပြောအဆို ပိုမိုယဥ်ကျေးရန် လိုအပ်သည်။", "မျက်နှာအမူအရာ တင်းမာမှုရှိတတ်ပြီး Customer များအား အခက်အခဲများကို ပြေလည်အောင် ဖြေရှင်းပေးရန် လိုအပ်သည်။", "ဝန်ဆောင်မှုနှင့် ပတ်သက်၍ Complain မရှိအောင် ပိုမိုဂရုစိုက်ရမည်ဖြစ်ပြီး စေတနာအရင်းခံကာ ဆောင်ရွက်ရန် လိုအပ်နေသည်။"]
        };
        const scoreKey = score >= 3 ? (score === 3 || score === 4 || score === 5 ? score : 3) : 0;
        return (colIndex === 3) ? remarksC[scoreKey][Math.floor(Math.random() * 3)] : remarksD[scoreKey][Math.floor(Math.random() * 3)];
    }

    async function updateSheet(r, c, v) {
        const status = document.getElementById('status-msg');
        status.style.display = 'block'; 
        status.textContent = 'သိမ်းဆည်းနေပါသည်...';
        
        try {
            const url = `${WEB_APP_URL}?row=${r}&col=${c}&val=${encodeURIComponent(v)}&sheet=${SHEET_NAME}`;
            const response = await fetch(url);
            
            if (response.ok) {
                const colNum = parseInt(c);
                if (colNum === 3 || colNum === 4) {
                    const nextRow = parseInt(r) + 1;
                    if (validRemarkRows.includes(nextRow)) {
                        const remarkText = generateRemark(parseInt(v), colNum);
                        const remarkUrl = `${WEB_APP_URL}?row=${nextRow}&col=${colNum}&val=${encodeURIComponent(remarkText)}&sheet=${SHEET_NAME}`;
                        await fetch(remarkUrl);
                    }
                }
                status.textContent = 'သိမ်းဆည်းမှု အောင်မြင်ပါသည်။';
                await fetchData(); 
                status.style.display = 'none'; 
            }
        } catch (e) { 
            status.textContent = 'Error: ချိတ်ဆက်မှု လွဲမှားနေပါသည်။'; 
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }
    }

    function filterData(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (type === 'all') { renderTable(window.allDataRows); return; }
        let employees = [];
        let currentEmp = null;
        window.allDataRows.forEach((row, rowIndex) => {
            const cell0 = row[0] ? String(row[0]).trim() : "";
            const isNameRow = cell0 && !row[1] && !row[2] && !cell0.includes("ပျမ်းမျှ");
            if (isNameRow) {
                if (currentEmp) employees.push(currentEmp);
                currentEmp = { rows: [row], hasRed: false, hasGreen: false };
            } else if (currentEmp) {
                currentEmp.rows.push(row);
                if (row[1] && String(row[1]).includes("Week")) {
                    for (let j = 2; j <= 7; j++) {
                        const s = parseInt(row[j]);
                        if (!isNaN(s)) { if (s <= 2) currentEmp.hasRed = true; if (s === 5) currentEmp.hasGreen = true; }
                    }
                }
                if (cell0.includes("ပျမ်းမျှဆုကြေးငွေစုစုပေါင်း")) {
                    const bv = parseFloat(String(row[2]).replace(/,/g, '')) || 0;
                    const mv = parseFloat(String(row[6]).replace(/,/g, '')) || 0;
                    if ((bv > 0 && bv <= 30000) || (mv > 0 && mv <= 30000)) currentEmp.hasRed = true;
                    if (bv > 60000 || mv > 60000) currentEmp.hasGreen = true;
                }
            }
        });
        if (currentEmp) employees.push(currentEmp);
        let result = [];
        employees.forEach(e => {
            if (type === 'low' && e.hasRed) result.push(...e.rows);
            if (type === '5' && e.hasGreen) result.push(...e.rows);
        });
        renderTable(result);
    }
    fetchData();
</script>
