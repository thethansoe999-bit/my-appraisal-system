<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appraisal Form For Trustworthy Bonus</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --teal-dark: #00796b; --teal-main: #009688; --teal-light: #e0f2f1; --teal-header: #b2dfdb; }
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f0f4f3; margin: 0; padding: 20px; }
        .container { max-width: 1550px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-title { text-align: center; color: var(--teal-dark); font-size: 36px; font-weight: bold; margin-bottom: 25px; border-bottom: 3px solid var(--teal-header); padding-bottom: 15px; }
        .filter-group { display: flex; gap: 15px; margin-bottom: 25px; justify-content: space-between; flex-wrap: nowrap; }
        .filter-btn, .print-btn { flex: 1; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Pyidaungsu', sans-serif; font-size: 15px; transition: all 0.3s ease; border: 2px solid #ddd; background: white; color: #333; text-align: center; }
        .btn-all:hover { background-color: #2196F3 !important; color: white !important; border-color: #2196F3; }
        .btn-reliable:hover { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50; }
        .btn-unreliable:hover { background-color: #f44336 !important; color: white !important; border-color: #f44336; }
        .print-btn:hover { background-color: #795548 !important; color: white !important; border-color: #795548; }
        .filter-btn.active { background-color: var(--teal-main); color: white; border-color: var(--teal-main); }
        .print-btn { background: #43a047; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; } 
        .emp-name-row td { background-color: var(--teal-light); color: var(--teal-dark); font-size: 24px; font-weight: bold; padding: 15px; border: 2px solid var(--teal-main); text-align: center; }
        .emp-header-row th:nth-child(1) { width: 30px; }  
        .emp-header-row th:nth-child(2) { width: 80px; }  
        .emp-header-row th:nth-child(n+3) { width: auto; } 
        .emp-header-row th { background-color: var(--teal-header); color: var(--teal-dark); padding: 8px 4px; font-size: 12px; border: 1px solid #90a4ae; height: 110px; vertical-align: middle; line-height: 1.4; word-wrap: break-word; }
        td { border: 1px solid #cfd8dc; text-align: center; vertical-align: middle; height: 45px; font-size: 14px; overflow: hidden; }
        .total-row td { background-color: #f9f9f9; font-weight: bold; }
        .editable:hover { background-color: #fff9c4 !important; outline: 2px solid var(--teal-main); cursor: cell; }
        #status-msg { text-align: center; padding: 10px; font-weight: bold; color: var(--teal-dark); font-size: 18px; }
        @media print { @page { size: A3 landscape; margin: 0.5cm; } body { padding: 0; background: white; } .container { box-shadow: none; max-width: 100%; padding: 0; } .filter-group { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Appraisal Form For Trustworthy Bonus</div>
    <div class="filter-group">
        <button id="btn-all" class="filter-btn active btn-all" onclick="filterData('all', this)">All Employees</button>

    </div>
    <div id="status-msg">ဒေတာများကို ချိတ်ဆက်နေပါသည်...</div>
    <table id="appraisalTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

    async function fetchData() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:H500?key=${API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.values) {
                window.allDataRows = data.values; 
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('appraisalTable').style.display = 'table';

            }

    function renderTable(rows) {

        tableBody.innerHTML = '';

        rows.forEach((row, rowIndex) => {
            const sheetRowNum = rowIndex + 2; 
            const cell0 = row[0] ? String(row[0]).trim() : "";
            const cell1 = row[1] ? String(row[1]).trim() : "";
            if (cell0 === "No." || cell1 === "Week") return;
            const isNameRow = cell0 && !row[1] && !row[2] && !cell0.includes("ပျမ်းမျှ");

            if (isNameRow) {
                const trName = document.createElement('tr');
                trName.className = 'emp-name-row';
                const tdName = document.createElement('td');
                tdName.colSpan = 8;
                tdName.textContent = cell0;
                tdName.contentEditable = true;
                tdName.className = 'editable';
                tdName.onblur = (e) => updateSheet(sheetRowNum, 1, e.target.textContent.trim(), e.target);
                trName.appendChild(tdName);
                tableBody.appendChild(trName);
                tableBody.insertAdjacentHTML('beforeend', headerHTML);
            } else if (row[1] || cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း")) {
                const tr = document.createElement('tr');
                const isTotalRow = cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း");
                const isFinalBonusRow = cell0.includes("ပျမ်းမျှဆုကြေးငွေစုစုပေါင်း");
                const isRemarkRow = validRemarkRows.includes(sheetRowNum);
                if (isTotalRow) tr.className = 'total-row';

                for (let i = 0; i < 8; i++) {
                    if (isTotalRow && i === 0) {
                        const td = document.createElement('td');
                        td.colSpan = 2; td.textContent = cell0; td.style.fontWeight = "bold"; td.style.textAlign = "center";
                        tr.appendChild(td); continue; 
                    }
                    if (isTotalRow && i === 1) continue;

                    if (i === 0 && !isTotalRow && row[1]) {
                        const startRows = [4, 18, 32, 46, 60, 74, 88, 102, 116, 130, 144, 158, 172];
                        if (startRows.includes(sheetRowNum)) {
                            const td = document.createElement('td');
                            td.textContent = cell0;
                            td.rowSpan = 8; 
                            td.style.fontWeight = "bold"; 
                            td.style.fontSize = "18px";
                            td.style.verticalAlign = "middle"; 
                            td.style.textAlign = "center";
                            tr.appendChild(td);
                        }
                        continue; 
                    }

                    const td = document.createElement('td');
                    let val = row[i] || ''; 
                    
                    if (isRemarkRow && i >= 2) {
                        td.style.height = "auto";
                        td.style.minHeight = "45px";
                        td.style.resize = "vertical"; 
                        td.style.overflow = "auto";
                        td.style.textAlign = "left";
                        td.style.padding = "5px";
                        td.style.fontSize = "12px";
                        td.className = 'editable remark-cell';
                        td.contentEditable = true;
                        td.onblur = (e) => updateSheet(sheetRowNum, i + 1, e.target.textContent.trim(), e.target);
                    } else if (i >= 2 && i <= 7 && !isTotalRow && row[1]) {
                        td.className = 'editable score-cell';
                        td.contentEditable = true;
                        const s = parseInt(val);
                        if (!isNaN(s)) {
                            if (s <= 2) { td.style.color = "red"; td.style.fontWeight = "bold"; }
                            else if (s === 5) { td.style.color = "#2e7d32"; td.style.fontWeight = "bold"; }
                        }
                        td.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); e.target.blur(); } };
                        td.onblur = (e) => updateSheet(sheetRowNum, i + 1, e.target.textContent.trim(), e.target);
                    }

                    td.textContent = val;
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }
        });

        };
        const remarksE = {
            5: ["တာဝန်ယူလိုစိတ် အပြည့်ရှိပြီး အကျင့်စာရိတ္တ ရိုးသားဖြောင့်မတ်သည်။ အမှားကို ဝန်ခံပြင်ဆင်တတ်ပြီး လုပ်ဖော်ကိုင်ဖက်များအပေါ် အမြဲကူညီပေးသည်။", "ကိုယ်ပိုင်အသိစိတ်ဓာတ်ဖြင့် အမှားဝန်ခံတတ်ပြီး အထက်လူကြီးနှင့် ပူးပေါင်းဆောင်ရွက်မှု အကောင်းဆုံးဖြစ်သည်။ ငွေကြေး/ပစ္စည်း အလွဲသုံးစားမှု လုံးဝမရှိပါ။", "စေ့စပ်သေချာစွာ လုပ်ကိုင်တတ်ပြီး မိမိ၏ ဆောင်ရွက်ချက်များကို နေ့စဉ်ပုံမှန်တင်ပြသည်။ လုပ်ဖော်ကိုင်ဖက်များအပေါ် လေးစားစွာ ဆက်ဆံတတ်သူဖြစ်သည်။"],
            4: ["အထက်လူကြီး၏ ညွှန်ကြားချက်ကို တိကျစွာလိုက်နာပြီး အလုပ်တွင် စေ့စပ်သေချာသည်။ ဆောင်ရွက်ချက်များကို နေ့စဉ်ပုံမှန် တင်ပြနိုင်သူဖြစ်သည်။", "အလုပ်ချိန် လေလွင့်မှုမရှိဘဲ တာဝန်ယူလိုစိတ်ရှိသည်။ လုပ်ငန်းခွင်အတွင်း ပြဿနာများကို လုပ်ဖော်ကိုင်ဖက်များနှင့်အတူ ဝိုင်းဝန်းဖြေရှင်းပေးတတ်သည်။", "ရိုးသားဖြောင့်မတ်ပြီး အမှားနည်းအောင် ဂရုစိုက်လုပ်ကိုင်သည်။ အကျိုးတူအဖွဲ့အစည်းများနှင့်လည်း အပြန်အလှန်လေးစားစွာ ပူးပေါင်းဆောင်ရွက်နိုင်သည်။"],
            3: ["လုပ်ငန်းခွင်တွင် အပြန်အလှန် လေးစားမှုရှိပြီး အချင်းချင်း ပူးပေါင်းဆောင်ရွက်တတ်သည်။ အလုပ်ချိန်ကို လေလွင့်မှုမရှိအောင် ပုံမှန်တာဝန်ကျေသည်။", "ညွှန်ကြားချက်များကို လိုက်နာပြီး ပုံမှန်အတိုင်း လုပ်ကိုင်ဆောင်ရွက်သည်။ အလုပ်နှင့်ပတ်သက်သော အခက်အခဲများကို တိုင်ပင်ဆွေးနွေးလိုစိတ်ရှိသည်။", "အကျင့်စာရိတ္တ ရိုးသားပြီး သတ်မှတ်ထားသော တာဝန်များကို စံချိန်စံညွှန်အတွင်းမှ ပုံမှန်ပြီးမြောက်အောင် ဆောင်ရွက်ပေးသည်။"],
            0: ["တာဝန်ယူလိုစိတ်နှင့် စေ့စပ်သေချာမှု မြှင့်တင်ရန် လိုအပ်သည်။ အမှားများကို နောက်တစ်ကြိမ် မဖြစ်အောင် ပိုမိုဂရုစိုက်ပြီး ပူးပေါင်းဆောင်ရွက်ရန် လိုသည်။", "အလုပ်ချိန် လေလွင့်မှုမရှိစေရန်နှင့် မိမိအမှားကို ဝန်ခံပြင်ဆင်သည့် စိတ်နေသဘောထား ပိုမိုရှိရန် လိုအပ်သည်။", "လုပ်ဖော်ကိုင်ဖက်များအပေါ် ဆက်ဆံရေးနှင့် ပူးပေါင်းဆောင်ရွက်လိုစိတ် မြှင့်တင်ရမည်ဖြစ်ပြီး ရိုးသားဖြောင့်မတ်စွာ ဆောင်ရွက်ရန် လိုအပ်နေသည်။"]
        };

        const scoreKey = score >= 3 ? (score === 3 || score === 4 || score === 5 ? score : 3) : 0;
        
        if (colIndex === 3) return remarksC[scoreKey][Math.floor(Math.random() * 3)];
        if (colIndex === 4) return remarksD[scoreKey][Math.floor(Math.random() * 3)];
        if (colIndex === 5) return remarksE[scoreKey][Math.floor(Math.random() * 3)];
        return "";
    }

    async function updateSheet(r, c, v, element) {
        // ... (Status Msg ပြသခြင်း logic) ...
        const colNum = parseInt(c);
        // Column C (3), D (4), E (5) ဖြစ်လျှင် Remark ထည့်မည်
        if (colNum === 3 || colNum === 4 || colNum === 5) {
            const nextRow = parseInt(r) + 1;
            if (validRemarkRows.includes(nextRow)) {
                const remarkText = generateRemark(parseInt(v), colNum);
                
                // UI တွင် ချက်ချင်းအရင်ပြခြင်း
                const tr = element.parentElement;
                const nextTr = tr.nextElementSibling;
                if (nextTr) {
                    const remarkCell = nextTr.children[colNum - 1]; 
                    if (remarkCell) {
                        remarkCell.textContent = remarkText;
                        remarkCell.style.color = "blue"; 
                    }
                }

                // Background တွင် ဒေတာပို့ပါသည်
                Promise.all([
                    fetch(`${WEB_APP_URL}?row=${r}&col=${c}&val=${encodeURIComponent(v)}&sheet=${SHEET_NAME}`),
                    fetch(`${WEB_APP_URL}?row=${nextRow}&col=${colNum}&val=${encodeURIComponent(remarkText)}&sheet=${SHEET_NAME}`)
                ]).then(() => {
                    status.textContent = 'သိမ်းဆည်းမှု အောင်မြင်ပါသည်။';
                    // အပြာရောင်စာသားကို အနက်ရောင် ပြန်ပြောင်းပေးရန် fetchData ပြန်ခေါ်ပါသည်
                    setTimeout(() => { status.style.display = 'none'; fetchData(); }, 1000);
                }).catch(() => {
                    status.textContent = 'ချိတ်ဆက်မှု လွဲမှားနေပါသည်။';
                });
                return;
            }
        }

        try {
            const url = `${WEB_APP_URL}?row=${r}&col=${c}&val=${encodeURIComponent(v)}&sheet=${SHEET_NAME}`;
            const response = await fetch(url);
            if (response.ok) {
                status.textContent = 'သိမ်းဆည်းမှု အောင်မြင်ပါသည်။';
                setTimeout(() => { status.style.display = 'none'; fetchData(); }, 1000);
            }
        } catch (e) { 
            status.textContent = 'Error: ချိတ်ဆက်မှု လွဲမှားနေပါသည်။'; 
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }
    }

    function filterData(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (type === 'all') { renderTable(window.allDataRows); return; }
        // Filter logic remains the same
    }
    fetchData();
</script>
