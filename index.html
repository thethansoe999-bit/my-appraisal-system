<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appraisal Form For Trustworthy Bonus</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --teal-dark: #00796b; --teal-main: #009688; --teal-light: #e0f2f1; --teal-header: #b2dfdb; }
    body { font-family: 'Pyidaungsu', sans-serif; background-color: #f0f4f3; margin: 0; padding: 20px; }
    
    /* A3 Landscape အတွက် Container ကို အကျယ်ချဲ့ခြင်း */
    .container { 
        max-width: 1550px; 
        margin: auto; 
        background: white; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
    }
    
    .header-title { text-align: center; color: var(--teal-dark); font-size: 36px; font-weight: bold; margin-bottom: 25px; border-bottom: 3px solid var(--teal-header); padding-bottom: 15px; }
    
    .filter-group { display: flex; gap: 15px; margin-bottom: 25px; justify-content: space-between; flex-wrap: nowrap; }
    .filter-btn, .print-btn { flex: 1; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Pyidaungsu', sans-serif; font-size: 15px; transition: all 0.3s ease; border: 2px solid #ddd; background: white; color: #333; text-align: center; }

    .btn-all:hover { background-color: #2196F3 !important; color: white !important; border-color: #2196F3; }
    .btn-reliable:hover { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50; }
    .btn-unreliable:hover { background-color: #f44336 !important; color: white !important; border-color: #f44336; }
    .print-btn:hover { background-color: #795548 !important; color: white !important; border-color: #795548; }

    .filter-btn.active { background-color: var(--teal-main); color: white; border-color: var(--teal-main); }
    .print-btn { background: #43a047; color: white; border: none; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; } /* table-layout: fixed က Column အကျယ်ကို ပုံသေဖြစ်စေသည် */
    
    .emp-name-row td { background-color: var(--teal-light); color: var(--teal-dark); font-size: 24px; font-weight: bold; padding: 15px; border: 2px solid var(--teal-main); text-align: center; }
    
    /* Column အကျယ်များကို တစ်ပြေးညီ ချိန်ညှိခြင်း */
    .emp-header-row th:nth-child(1) { width: 50px; } /* No. */
    .emp-header-row th:nth-child(2) { width: 100px; } /* Week */
    
    /* Column C မှ H အထိ (၃ ခုမြောက်မှ ၈ ခုမြောက်အထိ) ကို အကျယ် ညီညာအောင် ထားခြင်း */
    .emp-header-row th:nth-child(n+3) { width: auto; } 

    .emp-header-row th { 
        background-color: var(--teal-header); 
        color: var(--teal-dark); 
        padding: 8px 4px; 
        font-size: 13px; 
        border: 1px solid #90a4ae; 
        height: 110px; 
        vertical-align: middle;
        line-height: 1.5;
        word-wrap: break-word;
    }
    
    td { border: 1px solid #cfd8dc; text-align: center; vertical-align: middle; height: 45px; font-size: 14px; overflow: hidden; }
    .total-row td { background-color: #f9f9f9; font-weight: bold; }
    .editable:hover { background-color: #fff9c4 !important; outline: 2px solid var(--teal-main); cursor: cell; }
    #status-msg { text-align: center; padding: 10px; font-weight: bold; color: var(--teal-dark); font-size: 18px; }

    /* Print ထုတ်သည့်အခါ A3 Landscape ဖြစ်စေရန် */
    @media print {
        @page { size: A3 landscape; margin: 1cm; }
        body { padding: 0; background: white; }
        .container { box-shadow: none; max-width: 100%; padding: 0; }
        .filter-group { display: none; } /* Print ထုတ်ရင် ခလုတ်တွေ ဖျောက်ထားမည် */
    }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">Appraisal Form For Trustworthy Bonus</div>
    <div class="filter-group">
        <button class="filter-btn active btn-all" onclick="filterData('all', this)">All Employees</button>
        <button class="filter-btn btn-reliable" onclick="filterData('5', this)">Reliable Employees</button>
        <button class="filter-btn btn-unreliable" onclick="filterData('low', this)">Unreliable Employees</button>
        <button class="print-btn" onclick="window.print()">Print Report</button>
    </div>
    <div id="status-msg">ဒေတာများကို ချိတ်ဆက်နေပါသည်...</div>
    <table id="appraisalTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const SPREADSHEET_ID = '1CKh9lQ7Z3hV65IeSNyn3IhsUXFrxO4XfC8bbTsJ084A';
    const API_KEY = 'AIzaSyDXEoPAFqagxCdOBJgnRaEPAf-fIEPgnIY';
    const SHEET_NAME = 'Jan'; 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXLqm4_MT9iQi4fezcJ-Pd0dih2vBNemfWoyX0bKbgRGSRFy7NhXe2e7xLtUNcnuve/exec";

    async function fetchData() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:H500?key=${API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.values) {
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('appraisalTable').style.display = 'table';
                renderTable(data.values);
            }
        } catch (error) {
            document.getElementById('status-msg').textContent = 'ဒေတာချိတ်ဆက်မှု မအောင်မြင်ပါ။ (Internet သို့မဟုတ် API Key စစ်ဆေးပါ)';
        }
    }

    function renderTable(rows) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        const headerHTML = `<tr class="emp-header-row">
            <th style="width: 50px;">No.</th>
            <th style="width: 100px;">Week</th>
            <th>မှီခိုအားထားနိုင်ခြင်း နှင့် ယုံကြည်စိတ်ချရခြင်း<br>(Dependable and Reliable)</th>
            <th>ဝန်ဆောင်မှု ကောင်းမွန်ခြင်း<br>(Good Customer Service)</th>
            <th>တာဝန်ယူတတ်ခြင်း နှင့် စိတ်နေသဘောထား<br>(Accountable and Good Attitude)</th>
            <th>လူအများနှင့် လိုက်လျောညီထွေ ပြောဆိုနေထိုင်တတ်မှု<br>(Good Communication)</th>
            <th>သပ်ရပ်သန့်ရှင်းစွာ နေထိုင်တတ်ခြင်း<br>(Personal Grooming)</th>
            <th>စည်းကမ်းလိုက်နာမှု<br>(Disciplinarian)</th>
        </tr>`;

        let currentNo = ""; // လက်ရှိ နံပါတ်စဉ်ကို မှတ်ထားရန်

        rows.forEach((row, rowIndex) => {
            const cell0 = row[0] ? String(row[0]).trim() : "";
            const cell1 = row[1] ? String(row[1]).trim() : "";
            
            if (cell0 === "No." || cell1 === "Week") return;

            const isNameRow = cell0 && !row[1] && !row[2] && !cell0.includes("ပျမ်းမျှ");

            if (isNameRow) {
                const trName = document.createElement('tr');
                trName.className = 'emp-name-row';
                trName.innerHTML = `<td colspan="8">${cell0}</td>`;
                tableBody.appendChild(trName);
                tableBody.insertAdjacentHTML('beforeend', headerHTML);
                currentNo = ""; // ဝန်ထမ်းအသစ်ရောက်တိုင်း No. ကို Reset လုပ်ရန်
            } else if (row[1] || cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း")) {
                const tr = document.createElement('tr');
                const isTotalRow = cell0.includes("Total") || cell0.includes("Average") || cell0.includes("စုစုပေါင်း");
                
                if (isTotalRow) tr.className = 'total-row';

                for (let i = 0; i < 8; i++) {
                    // Column A (No.) ဖြစ်ပြီး ဒေတာ Row ဖြစ်ပါက Merge လုပ်ရန်
                    if (i === 0 && !isTotalRow && row[1]) {
                        if (cell0 !== "" && cell0 !== currentNo) {
                            const td = document.createElement('td');
                            td.textContent = cell0;
                            td.rowSpan = 8; // Row ၈ ခုကို Merge လုပ်ခြင်း (Week 1 to Remark 4)
                            td.style.fontWeight = "bold";
                            td.style.fontSize = "18px";
                            td.style.verticalAlign = "middle"; // Center ကျစေရန်
                            tr.appendChild(td);
                            currentNo = cell0;
                        }
                        continue; // ကျန်တဲ့ Row အလွတ်တွေမှာ No. အကွက် ထပ်မဖန်တီးတော့ပါ
                    }

                    const td = document.createElement('td');
                    let val = row[i] || '';

                    if (isTotalRow && cell0.includes("စုစုပေါင်း") && i === 0) {
                        td.textContent = cell0;
                        td.style.textAlign = "left";
                        td.style.paddingLeft = "10px";
                    } else {
                        td.textContent = val;
                    }

                    if (i >= 2 && i <= 7 && !isTotalRow && row[1]) {
                        td.className = 'editable';
                        td.contentEditable = true;
                        td.onblur = () => updateSheet(rowIndex + 2, i + 1, td.textContent.trim());
                    }
                    tr.appendChild(td);
                }
                tableBody.appendChild(tr);
            }
        });
    }

    async function updateSheet(r, c, v) {
        const status = document.getElementById('status-msg');
        status.style.display = 'block';
        status.textContent = 'Updating Google Sheets...';
        try {
            await fetch(`${WEB_APP_URL}?row=${r}&col=${c}&val=${encodeURIComponent(v)}&sheet=${SHEET_NAME}`, { mode: 'no-cors' });
            status.textContent = 'Saved Successfully!';
            setTimeout(() => status.style.display = 'none', 1500);
        } catch (e) { status.textContent = 'Error saving data.'; }
    }

    function filterData(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    fetchData();
</script>
</body>
</html>
